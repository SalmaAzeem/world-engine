version: '3.8'

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: world-engine-mqtt
    ports:
      - "1884:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  engine:
    build: .
    container_name: world-engine
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
      - PYTHONUNBUFFERED=1
    depends_on:
      - mqtt
    restart: unless-stopped

  subscriber:
    build: .
    container_name: world-engine-subscriber
    command: [ "python", "subscriber.py" ]
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
      - PYTHONUNBUFFERED=1
    depends_on:
      - mqtt
    restart: unless-stopped
